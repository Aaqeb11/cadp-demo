services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: cadp-backend:latest
    container_name: cadp-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      CADP_SERVER: ${CADP_SERVER}
      CADP_REGISTRATION_TOKEN: ${CADP_REGISTRATION_TOKEN}
      CADP_POLICY: ${CADP_POLICY}
      CADP_USER_SET: ${CADP_USER_SET}
    networks:
      - cadp-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    image: cadp-frontend:latest
    container_name: cadp-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    networks:
      - cadp-network

networks:
  cadp-network:
    driver: bridge
