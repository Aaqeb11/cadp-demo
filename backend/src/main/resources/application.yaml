cadp:
  server: ${CADP_SERVER}
  registration-token: ${CADP_REGISTRATION_TOKEN}
  policy: ${CADP_POLICY}
  user-set: ${CADP_USER_SET}

spring:
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

server:
  port: 8080
