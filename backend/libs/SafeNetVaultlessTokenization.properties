# [Version]
# Version of the properties file for the Vaultless Tokenization.
#
# Do not modify this property.
#
Version=5.0.0.000


# [UnicodeCodePointProperties]
# Finer control over how VaultLess Tokenization chooses characters for tokenizing can
# be specified in the UnicdoeCodePointProperties file. 
# Unicode code point block can be defined in this file.  See the documentation and
# file that installs with VaultLess Tokenization, unicode.properties, and the sample
# methods for defining code points.
#
# Specify the path and filename. Do not use quotes when specifying the path,
# even if it contains spaces.
UnicodeCodePointProperties=


#[Logging Configuration]
# [Upload log file to the Key Manager]
#
# This value specifies if VaultLess Tokenization log messages should
# also be uploaded to NAE server.
#
# Valid values:
#   yes - log messages will be uploaded to NAE Server
#   no  - log messages will not be uploaded to NAE Server
# 
# Default: no
#
Log_To_Server=no

#[Logging Configuration]
# [Log Token value]
#
# This value specifies if token value should be logged in the log file.
#
# Valid values:
#    yes - token value will be logged
#    no - token value will not be logged
# 
# Default: no
#
Log_Token=no

#If true, APIs accept password obfuscated with 'obfuscator' utility
#Valid values are 'true' or 'false'
#Any invalid value is treated as false
PasswordObfuscation=false

